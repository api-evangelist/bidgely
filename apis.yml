aid: bidgely
name: Bidgely
description: >-
  Bidgely is a Mountain View, California energy analytics company that builds
  AI software for electric and gas utilities. Its flagship platform, UtilityAI,
  applies patented non-intrusive load monitoring (NILM) and disaggregation
  techniques to smart meter interval data to infer appliance-level energy
  usage — air conditioning, heat pumps, electric vehicles, pool pumps, water
  heaters and more — from the whole-home meter signal alone, without surveys,
  sub-meters, or smart plugs. The platform layers GenAI natural-language
  interfaces and Agentic AI workflows on top of disaggregation to support
  utility programs across demand-side management, customer engagement and
  high-bill alerts, load flexibility and time-of-use, electrification (EV and
  heat pump targeting), grid resiliency and DER planning, affordability and
  income-qualified outreach, gas efficiency, small and mid-sized business
  programs, and energy theft detection. Bidgely is sold to utilities as SaaS
  or deployable into customer AWS, Snowflake, Databricks, Azure, and Oracle
  environments, and exposes embeddable customer-facing widgets to utility
  digital channels. Bidgely has been deployed by more than 50 utilities across
  four continents — including FortisBC, Arizona Public Service, PacifiCorp,
  Avista, NV Energy, Nova Scotia Power, and SoCalGas — covering tens of
  millions of meters. Bidgely operates an internal REST API surface across
  regional endpoints (naapi.bidgely.com, api.eu.bidgely.com) for its own pilot
  deployments and embeddable widgets, but does not currently publish a public
  developer portal, OpenAPI specification, or self-service API key program;
  integration is conducted under utility contracts.
